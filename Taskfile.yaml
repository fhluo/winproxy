# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

includes:
  go:
    dir: go
    taskfile: go/Taskfile.yaml

tasks:
  run:
    cmd: cargo run -p winproxy-cli -- {{.CLI_ARGS}}

  build:
    cmd: cargo build -p winproxy-cli --release

  install:
    cmd: cargo install --path winproxy-cli
